<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deeps AI | Chatbot Interface</title>
    <meta name="description" content="A modern, responsive AI chatbot interface powered by Deeps AI and Gemini 2.5 Flash.">
    <!-- Google Fonts: Inter and Outfit for a premium feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Persistent Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-thread-btn" id="new-thread-btn">
                    <i data-lucide="plus" class="icon-sm"></i>
                    <span>New Thread</span>
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="history-label">Recents</div>
                <div class="history-list" id="history-list">
                    <!-- History items will be injected here -->
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">D</div>
                    <div class="user-info">
                        <span class="user-name">Deeps User</span>
                    </div>
                    <i data-lucide="settings" class="icon-xs"></i>
                </div>
            </div>
        </aside>

        <!-- Main Application Area -->
        <main class="main-content">
            <header class="logo-area">
                <h1 id="brand-logo" class="brand-logo">deeps</h1>
            </header>

            <section class="search-container">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Ask anything..." rows="1"></textarea>
                    
                    <div class="controls-container">
                        <div class="left-controls">
                            <button class="icon-btn" title="Add source" id="add-source-btn">
                                <i data-lucide="plus" class="icon-sm"></i>
                            </button>
                            <input type="file" id="pdf-upload" accept=".pdf" style="display: none;">
                            <div class="chip-button" id="computer-chip">
                                <i data-lucide="monitor" class="icon-xs"></i>
                                <span id="file-status">Computer</span>
                                <i data-lucide="plus" class="icon-xs"></i>
                            </div>
                        </div>
                        
                        <div class="right-controls">
                            <div class="dropdown-btn" id="model-selector">
                                <span class="btn-text">Model</span>
                                <i data-lucide="chevron-down" class="icon-xs"></i>
                            </div>
                            <button class="icon-btn" title="Voice input" id="voice-btn">
                                <i data-lucide="mic" class="icon-sm"></i>
                            </button>
                            <button class="action-btn" id="submit-btn" disabled>
                                <i data-lucide="audio-lines" class="icon-sm"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Response Area -->
            <section id="response-container" class="response-area hidden">
                <div id="response-text" class="response-content"></div>
                <div class="response-actions">
                    <button class="action-btn-small" id="copy-btn">
                        <i data-lucide="copy" class="icon-xs"></i>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
